<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>沖繩自由行</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: rgba(255,255,255,0.96);
      --text: #142033;
      --muted: #374151;
      --line: #dbe2ea;
      --primary: #1677ff;
      --gold: #d4af37;
      --gold-ink: #6e5710;
      --shadow: 0 16px 48px rgba(15, 23, 42, 0.08);
      --radius: 24px;
      --header-h: 72px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(14,165,233,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(212,175,55,0.12), transparent 20%),
        linear-gradient(180deg, #eaf6ff 0%, #f7fafc 34%, #f6f8fb 100%);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    .topbar {
      position: sticky; top: 0; z-index: 40;
      backdrop-filter: blur(16px);
      background: rgba(246,248,251,0.82);
      border-bottom: 1px solid rgba(219,226,234,0.9);
    }
    .topbar-inner, .app { width: min(1180px, calc(100vw - 24px)); margin: 0 auto; }
    .topbar-inner {
      min-height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 12px 0;
    }
    .app { padding: 14px 0 40px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 44px; height: 44px; border-radius: 14px; overflow: hidden; flex: 0 0 auto;
      background: linear-gradient(135deg, #1e90ff, #7dd3fc 60%, #fff5cc);
      box-shadow: 0 12px 28px rgba(22, 119, 255, 0.18); position: relative;
    }
    .brand-mark::before, .brand-mark::after { content:""; position:absolute; border-radius:999px; }
    .brand-mark::before { width:32px; height:32px; background:rgba(255,255,255,0.72); top:-10px; right:-10px; }
    .brand-mark::after { width:56px; height:18px; background:rgba(255,255,255,0.55); left:-4px; bottom:8px; transform: rotate(-10deg); }
    .brand h1 { margin: 0; font-size: 1.05rem; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 0.88rem; font-weight: 700; }
    .header-actions, .mode-switch, .hero-badges, .pill-row, .actions, .link-list { display:flex; flex-wrap:wrap; gap:10px; }
    .chip, .mode-btn, .pill, .hero-badge, .time-badge { border-radius: 999px; font-weight: 800; }
    .chip {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 12px; background:rgba(255,255,255,0.92);
      border:1px solid rgba(219,226,234,0.95); color:var(--muted); font-size:0.88rem;
    }
    .hero {
      margin-top:16px; border-radius:32px; overflow:hidden; min-height:520px;
      box-shadow: var(--shadow);
      background:
        linear-gradient(180deg, rgba(11,17,32,0.16), rgba(11,17,32,0.68)),
        url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80") center/cover;
      color:#fff; display:flex; align-items:flex-end;
    }
    .hero-content {
      width:100%;
      display:grid; grid-template-columns:1.25fr 0.9fr; gap:18px; align-items:end;
      padding:28px;
    }
    .hero h2 { margin:0 0 12px; line-height:1.05; letter-spacing:-0.03em; font-size:clamp(2rem, 4vw, 3.3rem); }
    .hero .sub { max-width:760px; margin:0 0 18px; color:rgba(255,255,255,0.92); line-height:1.78; font-size:1rem; }
    .mode-btn {
      border:1px solid rgba(255,255,255,0.24);
      background:rgba(255,255,255,0.14);
      color:#fff; padding:10px 14px; cursor:pointer; transition:0.2s ease;
    }
    .mode-btn.active {
      background:linear-gradient(135deg, rgba(255,245,197,0.95), rgba(212,175,55,0.95));
      color:#5c470c; border-color:rgba(255,245,197,0.95); box-shadow:0 10px 24px rgba(212,175,55,0.2);
    }
    .hero-badge {
      padding:11px 14px; background:rgba(255,255,255,0.14);
      border:1px solid rgba(255,255,255,0.18); font-size:0.95rem;
    }
    .hero-panel {
      display:grid; gap:12px; padding:18px; border-radius:24px;
      background:rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.18);
    }
    .hero-panel h3, .section-title h3, .card h4 { margin:0; }
    .hero-panel p { margin:0; color:rgba(255,255,255,0.9); line-height:1.72; font-size:0.95rem; }
    .hero-panel .accent { color:#fff5c5; font-weight:800; }
    .section-title { display:flex; align-items:end; justify-content:space-between; gap:14px; margin:28px 0 16px; }
    .section-title h3 { font-size:1.45rem; letter-spacing:-0.02em; }
    .section-title p { margin:6px 0 0; color:var(--muted); font-weight:700; line-height:1.75; }
    .notice-grid, .summary-grid, .prep-grid, .spot-grid, .info-grid, .price-box, .day-layout, .modal-grid {
      display:grid; gap:16px;
    }
    .notice-grid { grid-template-columns:repeat(4, minmax(0,1fr)); }
    .summary-grid { grid-template-columns:repeat(3, minmax(0,1fr)); }
    .prep-grid { grid-template-columns:1.2fr 1fr; }
    .spot-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
    .info-grid, .price-box, .modal-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
    .day-layout { grid-template-columns:1.25fr 0.86fr; align-items:start; }
    .card {
      background: var(--card); border:1px solid rgba(219,226,234,0.95);
      border-radius: var(--radius); box-shadow: var(--shadow); padding:18px;
    }
    .notice-card, .summary-card, .prep-card, .spot-card, .day-panel, .timeline, .info-card { display:grid; gap:12px; }
    .notice-card p, .summary-card p, .prep-card p, .spot-card p, .day-panel p, .itinerary-card p, .info-card p,
    .modal-body p, li, .subtle, .meta-strong {
      color:var(--muted); font-size:0.95rem; font-weight:700; line-height:1.82;
    }
    .pill {
      padding:7px 10px; font-size:0.82rem; background:#f3f7fb;
      border:1px solid var(--line); color:var(--muted);
    }
    .pill.gold {
      background:rgba(212,175,55,0.16); color:var(--gold-ink); border-color:rgba(212,175,55,0.35);
    }
    .tabs {
      position:sticky; top:calc(var(--header-h) + 8px); z-index:25;
      margin-top:22px; padding:8px; gap:8px; display:flex; overflow-x:auto;
      background:rgba(246,248,251,0.94); backdrop-filter:blur(12px);
      border:1px solid rgba(219,226,234,0.92); border-radius:999px;
      box-shadow:0 10px 30px rgba(15,23,42,0.06); scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar { display:none; }
    .tab-btn {
      border:0; background:transparent; color:var(--muted); cursor:pointer;
      padding:11px 14px; border-radius:999px; font-weight:900; min-width:max-content; transition:0.2s ease;
    }
    .tab-btn.active {
      background:linear-gradient(135deg, #0f74ff, #16b5ff); color:#fff;
      box-shadow:0 10px 24px rgba(15,116,255,0.22);
    }
    .tab-panel { display:none; margin-top:18px; }
    .tab-panel.active { display:block; }
    .itinerary-card {
      position:relative; overflow:hidden; cursor:pointer;
      transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .itinerary-card:hover {
      transform:translateY(-4px); box-shadow:0 20px 40px rgba(15,23,42,0.12);
      border-color:rgba(22,119,255,0.28);
    }
    .itinerary-top {
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:12px; margin-bottom:10px;
    }
    .time-badge {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:78px; padding:8px 12px; background:#edf3ff;
      color:#0f5bca; border:1px solid #cadcff; flex-shrink:0;
    }
    .time-badge.gold {
      background:linear-gradient(135deg, rgba(212,175,55,0.2), rgba(255,246,211,0.82));
      color:var(--gold-ink); border-color:rgba(212,175,55,0.42);
      box-shadow:0 8px 20px rgba(212,175,55,0.16);
    }
    .itinerary-title { margin:0; font-size:1.05rem; line-height:1.5; }
    .btn {
      border:0; border-radius:999px; padding:10px 14px; display:inline-flex; align-items:center; gap:8px;
      font-weight:900; cursor:pointer; transition:0.2s ease;
    }
    .btn-primary {
      background:linear-gradient(135deg, #0f74ff, #15b2ff); color:#fff; box-shadow:0 10px 24px rgba(15,116,255,0.2);
    }
    .btn-soft { background:#f4f7fb; color:var(--muted); border:1px solid var(--line); }
    .btn:hover { transform:translateY(-1px); }
    .day-panel { position:sticky; top:calc(var(--header-h) + 82px); }
    .cover-card { padding:0; overflow:hidden; }
    .cover-card img, .spot-card img {
      display:block; width:100%; height:220px; object-fit:cover; border-radius:18px 18px 0 0;
    }
    .spot-card img { border-radius:18px; margin-bottom:8px; }
    .cover-card .inner { padding:18px; }
    .quote {
      padding:16px; border-radius:18px;
      background:linear-gradient(135deg, rgba(15,116,255,0.08), rgba(14,165,233,0.1));
      border:1px solid rgba(15,116,255,0.14); color:#184580; font-weight:800; line-height:1.8;
    }
    .list-clean { margin:0; padding-left:1.2rem; }
    .price-item {
      padding:14px; border-radius:18px; background:#f6f9fc; border:1px solid var(--line);
    }
    .price-item strong { display:block; font-size:1rem; margin-bottom:6px; }
    .checklist { display:grid; gap:12px; margin-top:8px; }
    .check-item {
      display:flex; align-items:flex-start; gap:12px; padding:12px 14px;
      border-radius:16px; background:#f8fbff; border:1px solid var(--line);
    }
    .check-item input { margin-top:3px; width:18px; height:18px; accent-color:#1677ff; flex:0 0 auto; }
    .check-item span { color:var(--text); font-weight:800; line-height:1.65; }
    .footer { margin-top:26px; text-align:center; color:var(--muted); font-weight:800; padding-bottom:18px; }
    .modal {
      position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:16px;
      z-index:100; background:rgba(10,18,32,0.56); backdrop-filter:blur(10px);
    }
    .modal.open { display:flex; }
    .modal-card {
      width:min(820px, 100%); max-height:min(86vh, 900px); overflow:auto;
      background:#fff; border-radius:28px; box-shadow:0 30px 80px rgba(15,23,42,0.28);
      border:1px solid rgba(219,226,234,0.92);
    }
    .modal-hero {
      height:280px; background-size:cover; background-position:center; position:relative;
    }
    .modal-hero::after {
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(6,11,20,0.12), rgba(6,11,20,0.48));
    }
    .modal-close {
      position:absolute; right:16px; top:16px; z-index:2;
      width:42px; height:42px; border:0; border-radius:999px; background:rgba(255,255,255,0.92);
      color:#18304f; font-size:1.2rem; font-weight:900; cursor:pointer; box-shadow:0 8px 24px rgba(15,23,42,0.16);
    }
    .modal-body { padding:20px; display:grid; gap:18px; }
    .modal-heading { display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; }
    .modal-heading h3 { margin:0; font-size:1.45rem; line-height:1.4; }
    .modal-box {
      border-radius:18px; padding:16px; background:#f7fafd; border:1px solid var(--line);
    }
    @media (max-width: 980px) {
      .notice-grid, .summary-grid, .prep-grid, .spot-grid, .info-grid, .price-box, .day-layout, .hero-content, .modal-grid {
        grid-template-columns: 1fr;
      }
      .day-panel { position: static; }
      .hero { min-height: 560px; }
    }
    @media (max-width: 720px) {
      :root { --header-h: 68px; }
      .app, .topbar-inner { width: min(100vw - 18px, 1180px); }
      .hero { min-height: 640px; border-radius: 24px; }
      .hero-content, .card, .modal-body { padding: 16px; }
      .brand h1 { font-size: 0.98rem; }
      .brand p { font-size: 0.82rem; }
      .section-title { flex-direction: column; align-items: flex-start; }
      .modal-hero { height: 220px; }
      .itinerary-top { flex-direction: column; }
      .header-actions { display: none; }
      .tabs { top: calc(var(--header-h) + 6px); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>沖繩自由行</h1>
          <p id="brandSub">6 人・2 晚 3 天・雙住宿版本切換</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="chip">☀️ 5 月白天約 24–27°C</span>
        <span class="chip">✈️ Tigerair 晚去晚回</span>
        <span class="chip" id="headerModeChip">🏙️ 目前：住那霸</span>
      </div>
    </div>
  </header>

  <div class="app">
    <section class="hero">
      <div class="hero-content">
        <div>
          <div class="mode-switch" id="modeSwitch">
            <button class="mode-btn active" data-mode="naha" type="button">住那霸版</button>
            <button class="mode-btn" data-mode="onna" type="button">住恩納版</button>
          </div>
          <h2 id="heroTitle">沖繩自由行<br />那霸市區版：城市節奏＋海邊收尾</h2>
          <p class="sub" id="heroSub"></p>
          <div class="hero-badges" id="heroBadges"></div>
        </div>
        <div class="hero-panel">
          <h3>本次主線</h3>
          <div id="heroPanelContent"></div>
          <p class="subtle" id="panelNote"></p>
        </div>
      </div>
    </section>

    <div class="notice-grid" id="noticeGrid" style="margin-top: 18px;"></div>

    <nav class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="overview" type="button">總覽</button>
      <button class="tab-btn" data-tab="day1" type="button">Day 1</button>
      <button class="tab-btn" data-tab="day2" type="button">Day 2</button>
      <button class="tab-btn" data-tab="day3" type="button">Day 3</button>
      <button class="tab-btn" data-tab="spots" type="button">景點精選</button>
      <button class="tab-btn" data-tab="prep" type="button">行前準備</button>
    </nav>

    <section id="overview" class="tab-panel active">
      <div class="section-title">
        <div>
          <h3>旅程總覽</h3>
          <p id="overviewIntro"></p>
        </div>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="info-grid" id="overviewInfoGrid"></div>
      <div class="section-title">
        <div>
          <h3>預算概念</h3>
          <p id="budgetIntro"></p>
        </div>
      </div>
      <div class="price-box" id="budgetGrid"></div>
    </section>

    <section id="day1" class="tab-panel"></section>
    <section id="day2" class="tab-panel"></section>
    <section id="day3" class="tab-panel"></section>

    <section id="spots" class="tab-panel">
      <div class="section-title">
        <div>
          <h3>景點精選</h3>
          <p id="spotsIntro"></p>
        </div>
      </div>
      <div class="spot-grid" id="spotGrid"></div>
    </section>

    <section id="prep" class="tab-panel">
      <div class="section-title">
        <div>
          <h3>行前準備與備忘錄</h3>
          <p>可直接勾選。勾選狀態會暫存在瀏覽器中，方便出發前再檢查一次。</p>
        </div>
      </div>
      <div class="prep-grid">
        <article class="card prep-card">
          <h4>出發前 checklist</h4>
          <div class="checklist" id="checklist"></div>
        </article>
        <article class="card prep-card">
          <h4>快速提醒</h4>
          <div id="prepNotes"></div>
          <div class="quote" id="prepQuote"></div>
        </article>
      </div>
    </section>

    <div class="footer">沖繩自由行｜單一 HTML・雙住宿版本切換</div>
  </div>

  <div class="modal" id="detailModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-hero" id="modalHero">
        <button class="modal-close" id="modalClose" aria-label="Close" type="button">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const CHECKLIST_ITEMS = [
      '確認護照有效期與機票英文姓名一致',
      '虎航手提／托運行李規則確認完成',
      'Visit Japan Web 先填好並截圖備用',
      '包棟住宿地址、入住方式、門鎖密碼已儲存',
      '租車文件、保險與駕駛分工已確認',
      '行動網路 eSIM / 網卡已準備',
      '折疊傘、防曬、薄外套已放入行李',
      '信用卡、現金與海外刷卡通知已處理',
      'Google Maps 已收藏住宿、餐廳、景點',
      '最後一天機場移動方案已確認'
    ];

    const DATA = {
      naha: {
        modeLabel: '住那霸',
        brandSub: '6 人・2 晚 3 天・住那霸市區・夜生活方便',
        heroTitle: '沖繩自由行<br />那霸市區版：城市節奏＋海邊收尾',
        heroSub: '以台灣虎航晚去晚回為核心，住宿留在那霸市區，保留國際通晚餐、酒吧聊天與最後一天瀨長島看海。這版適合想要移動少、晚上續攤方便、吃喝選擇多的安排。',
        heroBadges: ['住那霸版', '國際通步行圈', 'Day 3 波上宮＋瀨長島', '酒吧聊天更順'],
        heroPanel: [
          'Day 1 抵達那霸後進市區，吃晚餐、走國際通，晚上找舒服的酒吧夜聊。',
          'Day 2 市區取車北上，美麗海＋古宇利大橋，晚上回那霸 rooftop bar。',
          'Day 3 波上宮、首里城、牧志市場後，再到瀨長島看海放鬆。'
        ],
        panelNote: '航班與票價仍以虎航訂票頁當日顯示為準。',
        notices: [
          { title: '✈️ 航班', text: '維持虎航晚去晚回，讓最後一天仍能保有完整下午。', pills: ['去程 18:20 → 20:40', '回程 21:30 → 22:05'], gold: [0,1] },
          { title: '🏠 住宿', text: '建議住國際通、牧志或美榮橋附近整套公寓／包棟，晚上最方便續攤。', pills: ['6 人整套', '近單軌站'], gold: [] },
          { title: '🚗 交通', text: 'Day 2 租 7–8 人座跑北部，其餘時間市區以單軌與計程車為主。', pills: ['Day 2 租車', '市區免開車'], gold: [] },
          { title: '🌧️ 天氣', text: '5 月溫暖偏潮，帶折疊傘與薄外套就很夠用。', pills: ['短袖為主', '雨備要有'], gold: [] }
        ],
        overviewIntro: '這份版本把交通效率與夜生活便利放在最前面，短天數也能兼顧市區、北部與海邊。',
        summaries: [
          { title: 'Day 1｜輕鬆落地', text: '落地後直接進那霸市區，入住包棟，國際通晚餐加酒吧聊天。', pills: ['重點時段 22:00 後', '不排太滿'], gold: [0] },
          { title: 'Day 2｜北部重點日', text: '市區租車北上，美麗海＋古宇利大橋一次完成，晚上回那霸。', pills: ['重點時段 08:00 取車', '古宇利大橋加碼'], gold: [0] },
          { title: 'Day 3｜海邊放鬆收尾', text: '波上宮、首里城、牧志市場後，把下午完整留給瀨長島。', pills: ['重點時段 15:30 海邊放空', '喝酒放鬆主線'], gold: [0] }

    const state = { mode: 'naha' };

    const tabs = Array.from(document.querySelectorAll('.tab-btn'));
    const modeButtons = Array.from(document.querySelectorAll('.mode-btn'));
    const modal = document.getElementById('detailModal');
    const modalBody = document.getElementById('modalBody');
    const modalHero = document.getElementById('modalHero');
    const modalClose = document.getElementById('modalClose');

    function currentMode() {
      return DATA[state.mode];
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function actionLink(url, label, type) {
      const safeUrl = escapeHtml(url);
      const safeLabel = escapeHtml(label);
      const cls = type === 'primary' ? 'btn btn-primary action-link' : 'btn btn-soft action-link';
      return '<a class="' + cls + '" href="' + safeUrl + '" target="_blank" rel="noopener noreferrer">' + safeLabel + '</a>';
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === tabId);
      });
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        state.mode = btn.dataset.mode;
        modeButtons.forEach(button => {
          button.classList.toggle('active', button.dataset.mode === state.mode);
        });
        renderAll();
      });
    });

    function renderHero() {
      const mode = currentMode();
      document.getElementById('brandSub').textContent = mode.brandSub;
      document.getElementById('headerModeChip').textContent = '🏨 目前：' + mode.modeLabel;
      document.getElementById('heroTitle').innerHTML = mode.heroTitle;
      document.getElementById('heroSub').textContent = mode.heroSub;
      document.getElementById('heroBadges').innerHTML = mode.heroBadges.map(item => '<span class="hero-badge">' + escapeHtml(item) + '</span>').join('');
      document.getElementById('heroPanelContent').innerHTML = mode.heroPanel.map(item => '<p>' + escapeHtml(item) + '</p>').join('');
      document.getElementById('panelNote').textContent = mode.panelNote;
    }

    function renderOverview() {
      const mode = currentMode();
      document.getElementById('noticeGrid').innerHTML = mode.notices.map(card => {
        return '<article class="card notice-card"><h4>' + escapeHtml(card.title) + '</h4><p>' + escapeHtml(card.text) + '</p><div class="pill-row">' +
          card.pills.map((pill, index) => '<span class="pill ' + (card.gold.includes(index) ? 'gold' : '') + '">' + escapeHtml(pill) + '</span>').join('') +
          '</div></article>';
      }).join('');

      document.getElementById('overviewIntro').textContent = mode.overviewIntro;

      document.getElementById('summaryGrid').innerHTML = mode.summaries.map(card => {
        return '<article class="card summary-card"><h4>' + escapeHtml(card.title) + '</h4><p>' + escapeHtml(card.text) + '</p><div class="pill-row">' +
          card.pills.map((pill, index) => '<span class="pill ' + (card.gold.includes(index) ? 'gold' : '') + '">' + escapeHtml(pill) + '</span>').join('') +
          '</div></article>';
      }).join('');

      document.getElementById('overviewInfoGrid').innerHTML = mode.infos.map(card => {
        return '<article class="card info-card"><h4>' + escapeHtml(card.title) + '</h4><p>' + escapeHtml(card.text) + '</p><div class="pill-row">' +
          card.pills.map((pill, index) => '<span class="pill ' + (card.gold.includes(index) ? 'gold' : '') + '">' + escapeHtml(pill) + '</span>').join('') +
          '</div></article>';
      }).join('');

      document.getElementById('budgetIntro').textContent = mode.budgetIntro;
      document.getElementById('budgetGrid').innerHTML = mode.budgets.map(card => {
        return '<article class="card price-item"><strong>' + escapeHtml(card.title) + '</strong><p class="meta-strong">' + escapeHtml(card.amount) + '</p><p>' + escapeHtml(card.text) + '</p></article>';
      }).join('');

      document.getElementById('spotsIntro').textContent = mode.spotsIntro;
      document.getElementById('prepNotes').innerHTML = mode.prepNotes.map((note, index) => '<p>' + (index + 1) + '. ' + escapeHtml(note) + '</p>').join('');
      document.getElementById('prepQuote').textContent = mode.prepQuote;
    }

    function renderDay(dayKey) {
      const day = currentMode().days[dayKey];
      const root = document.getElementById(dayKey);

      root.innerHTML =
        '<div class="section-title"><div><h3>' + escapeHtml(day.label) + '</h3><p>' + escapeHtml(day.summary) + '</p></div></div>' +
        '<div class="day-layout">' +
          '<div class="timeline" id="timeline-' + dayKey + '"></div>' +
          '<aside class="day-panel">' +
            '<article class="card cover-card">' +
              '<img src="' + escapeHtml(day.heroImage) + '" alt="' + escapeHtml(day.label) + '" loading="lazy" />' +
              '<div class="inner"><h4>' + escapeHtml(day.sideTitle) + '</h4><p>' + escapeHtml(day.sideNote) + '</p></div>' +
            '</article>' +
            '<article class="card"><h4>旅行小提醒</h4><p>' + escapeHtml(day.tip) + '</p><div class="quote">' +
              (dayKey === 'day3'
                ? '最後一天請保留機場與還車緩衝，不要排太極限。'
                : dayKey === 'day2'
                  ? '今天是整趟的主景點日，把精力放在北部主線。'
                  : '第一晚先把住宿與晚餐節奏穩住，隔天會更順。') +
              '</div></article>' +
            '<article class="card"><h4>今日重點</h4><ul class="list-clean">' +
              day.quick.map(item => '<li>' + escapeHtml(item) + '</li>').join('') +
            '</ul></article>' +
          '</aside>' +
        '</div>';

      const timeline = root.querySelector('#timeline-' + dayKey);
      day.items.forEach((item, index) => {
        const card = document.createElement('article');
        card.className = 'card itinerary-card';
        card.dataset.day = dayKey;
        card.dataset.index = String(index);
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.innerHTML =
          '<div class="itinerary-top">' +
            '<div class="time-badge ' + (item.important ? 'gold' : '') + '">' + escapeHtml(item.time) + '</div>' +
            '<div style="flex:1; min-width:0;">' +
              '<h4 class="itinerary-title">' + escapeHtml(item.title) + '</h4>' +
              '<p style="margin: 6px 0 0;">' + escapeHtml(item.brief) + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="pill-row">' +
            item.tags.map(tag => '<span class="pill ' + ((item.important && (tag.includes('重要') || tag.includes('重點'))) ? 'gold' : '') + '">' + escapeHtml(tag) + '</span>').join('') +
          '</div>' +
          '<div class="actions">' +
            actionLink(item.maps, 'Google Maps', 'primary') +
            actionLink(item.website, item.websiteLabel, 'soft') +
          '</div>';
        timeline.appendChild(card);
      });
    }

    function renderSpots() {
      const mode = currentMode();
      document.getElementById('spotGrid').innerHTML = mode.spots.map(spot => {
        return '<article class="card spot-card">' +
          '<img src="' + escapeHtml(spot.image) + '" alt="' + escapeHtml(spot.title) + '" loading="lazy" />' +
          '<h4>' + escapeHtml(spot.title) + '</h4>' +
          '<p>' + escapeHtml(spot.desc) + '</p>' +
          '<div class="actions">' +
            actionLink(spot.maps, 'Google Maps', 'primary') +
            actionLink(spot.site, '相關網站', 'soft') +
          '</div>' +
        '</article>';
      }).join('');
    }

    function renderChecklist() {
      const root = document.getElementById('checklist');
      const saved = JSON.parse(localStorage.getItem('okinawa-checklist') || '{}');
      root.innerHTML = '';
      CHECKLIST_ITEMS.forEach((item, index) => {
        const id = 'check-' + index;
        const row = document.createElement('label');
        row.className = 'check-item';
        row.innerHTML = '<input type="checkbox" id="' + id + '" ' + (saved[id] ? 'checked' : '') + ' /><span>' + escapeHtml(item) + '</span>';
        const input = row.querySelector('input');
        input.addEventListener('change', event => {
          saved[id] = event.target.checked;
          localStorage.setItem('okinawa-checklist', JSON.stringify(saved));
        });
        root.appendChild(row);
      });
    }

    function openModal(item) {
      modalHero.style.backgroundImage = "url('" + item.image.replaceAll("'", "\\'") + "')";
      modalBody.innerHTML =
        '<div class="modal-heading"><div>' +
          '<div class="pill-row" style="margin-top:0; margin-bottom:10px;">' +
            '<span class="time-badge ' + (item.important ? 'gold' : '') + '" style="min-width:auto;">' + escapeHtml(item.time) + '</span>' +
            '<span class="pill">' + escapeHtml(item.location) + '</span>' +
          '</div>' +
          '<h3 id="modalTitle">' + escapeHtml(item.title) + '</h3>' +
        '</div></div>' +
        '<p>' + escapeHtml(item.details) + '</p>' +
        '<div class="modal-grid">' +
          '<div class="modal-box"><strong>交通方式</strong><p>' + escapeHtml(item.traffic) + '</p></div>' +
          '<div class="modal-box"><strong>預估費用</strong><p>' + escapeHtml(item.cost) + '</p></div>' +
        '</div>' +
        '<div class="modal-box"><strong>旅遊小筆記</strong><p class="muted-strong">' + escapeHtml(item.brief) + '</p><p>這個點可以依天氣與團體精神狀況微調。若大家想放鬆，停留時間可加長；若要壓縮，也可保留主重點即可。</p></div>' +
        '<div><strong style="display:block; margin-bottom:10px;">相關連結</strong><div class="link-list">' +
          actionLink(item.maps, 'Google Maps', 'primary') +
          actionLink(item.website, item.websiteLabel, 'soft') +
        '</div></div>';
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function renderAll() {
      renderHero();
      renderOverview();
      renderDay('day1');
      renderDay('day2');
      renderDay('day3');
      renderSpots();
      renderChecklist();
    }

    document.addEventListener('click', event => {
      const link = event.target.closest('.action-link');
      if (link) {
        event.stopPropagation();
        return;
      }
      const card = event.target.closest('.itinerary-card');
      if (card) {
        const item = currentMode().days[card.dataset.day].items[Number(card.dataset.index)];
        if (item) {
          openModal(item);
        }
        return;
      }
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener('keydown', event => {
      const card = event.target.closest ? event.target.closest('.itinerary-card') : null;
      if (card && (event.key === 'Enter' || event.key === ' ')) {
        event.preventDefault();
        const item = currentMode().days[card.dataset.day].items[Number(card.dataset.index)];
        if (item) {
          openModal(item);
        }
      }
      if (event.key === 'Escape') {
        closeModal();
      }
    });

    modalClose.addEventListener('click', closeModal);
    renderAll();
    switchTab('overview');
  </script>
</body>
</html>
